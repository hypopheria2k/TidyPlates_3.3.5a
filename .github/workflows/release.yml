name: CI/CD Build Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Aktualisiert auf v4 (Node 24 kompatibel)

      - name: Package Addon
        run: |
          mkdir build
          cp -r TidyPlates build/
          cp -r TidyPlates_Graphite build/
          cp -r TidyPlates_Grey build/
          cp -r TidyPlates_Neon build/
          cp -r TidyPlates_Quatre build/
          cp -r TidyPlates_ThreatPlates build/
          cd build
          zip -r ../TidyPlates_3.3.5a_Latest.zip *
          cd ..

      - name: Update Release
        uses: softprops/action-gh-release@v2 # Aktualisiert auf v2 (Node 24 kompatibel)
        with:
          files: TidyPlates_3.3.5a_Latest.zip
          tag_name: latest
          name: "Latest Development Build"
          body: |
            This is an automated build from the latest commit.
            
            **Installation:**
            1. Download `TidyPlates_3.3.5a_Latest.zip` below.
            2. Extract ALL folders inside the ZIP directly into your `Interface/AddOns` directory.
            3. Enjoy the bug fixes and the new BG Class Scanner!
            
            *Last Update: ${{ github.event.head_commit.message }}*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}